<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Universe XR - 태양계 탐험</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: system-ui, sans-serif; }
  #info {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(0,0,0,0.5); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.5; max-width: 360px;
  }
  #info b { color: #8ec5ff; }
  #voice {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  }
  #micBtn {
    background: #1a73e8; color: #fff; border: 0; padding: 10px 16px;
    border-radius: 999px; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  #micBtn.listening { background: #d93025; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(217,48,37,.7);} 50% { box-shadow: 0 0 0 12px rgba(217,48,37,0);} }
  #status {
    background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 6px;
    font-size: 12px; max-width: 320px; text-align: right; min-height: 18px;
  }
  #loading {
    position: absolute; bottom: 12px; left: 12px; z-index: 10;
    background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 6px;
    font-size: 12px;
  }
</style>
</head>
<body>
<div id="info">
  <b>Universe XR — 태양계 탐험</b><br/>
  • PC: 마우스 드래그 회전, 휠 줌<br/>
  • XR 고글: 우하단 <b>VR/AR 입장</b>, 스틱으로 이동<br/>
  • 음성 명령 예시 (이름 말하면 가까이 날아감):<br/>
  &nbsp;&nbsp;"지구", "목성", "토성", "태양"<br/>
  &nbsp;&nbsp;"처음으로", "전부 보여줘", "다 숨겨"
</div>

<div id="voice">
  <button id="micBtn">🎙 음성 시작</button>
  <div id="status">음성 인식 대기</div>
</div>
<div id="loading">텍스처 로딩 중…</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

const loadingEl = document.getElementById('loading');

// ─── 씬 / 카메라 / 렌더러 ────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000005);
scene.fog = new THREE.FogExp2(0x000010, 0.00005);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 30000);
camera.position.set(0, 1.6, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.6, -10);

const player = new THREE.Group();
player.add(camera);
scene.add(player);

// 시작 위치/시점 저장 (홈으로 돌아가기용)
const HOME_CAM = camera.position.clone();
const HOME_TARGET = controls.target.clone();

// 카메라 자동 추적 상태 ─ 'earth', 'sun', 'home', 또는 null
let followKey = null;
// 행성의 로컬 좌표계에서의 카메라 오프셋 (자전을 따라가기 위해)
let followLocalOffset = null;
// 사용자가 직접 조작하면 추적 해제
controls.addEventListener('start', () => { followKey = null; followLocalOffset = null; });

// ─── 텍스처 로더 (진행률 표시) ───────────────────────
const manager = new THREE.LoadingManager();
manager.onProgress = (url, loaded, total) => {
  loadingEl.textContent = `텍스처 로딩 ${loaded}/${total}…`;
};
manager.onLoad = () => {
  loadingEl.textContent = '✓ 로딩 완료';
  setTimeout(() => loadingEl.style.opacity = '0', 1500);
  loadingEl.style.transition = 'opacity 0.8s';
};
manager.onError = (url) => {
  loadingEl.textContent = '⚠ 일부 텍스처 로드 실패';
  console.warn('Texture load error:', url);
};

const texLoader = new THREE.TextureLoader(manager);
texLoader.setCrossOrigin('anonymous');

// 텍스처 색공간을 sRGB로 맞춰주는 헬퍼
function loadTex(url, opts = {}) {
  const t = texLoader.load(url);
  t.colorSpace = THREE.SRGBColorSpace;
  if (opts.repeat) t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}
// 데이터 텍스처(범프/노멀/알파)는 sRGB 변환을 끔
function loadData(url) {
  const t = texLoader.load(url);
  t.colorSpace = THREE.NoColorSpace;
  return t;
}

// CDN: Jerome Etienne의 threex.planets (Planetary Visions 기반 공개 텍스처)
const TEX = 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/';

// ─── 별: 다층 별필드 ──────────────────────────────────
function makeStars(count, radius, size, color) {
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    const r = radius * (0.6 + 0.4 * Math.random());
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color, size, sizeAttenuation: true,
    transparent: true, opacity: 0.95, depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  return new THREE.Points(geo, mat);
}
scene.add(makeStars(8000, 5000, 2.5, 0xffffff));
scene.add(makeStars(3000, 4500, 4.0, 0xaaccff));
scene.add(makeStars(1500, 4000, 5.5, 0xffd9a8));
scene.add(makeStars(800,  3500, 7.0, 0xff9b6b));

// ─── 성운 ─────────────────────────────────────────────
function makeNebula(color, size, position) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(128,128,0, 128,128,128);
  grad.addColorStop(0, color + 'ff');
  grad.addColorStop(0.4, color + '55');
  grad.addColorStop(1, color + '00');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,256,256);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.65 });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(size, size, 1);
  sp.position.copy(position);
  return sp;
}
scene.add(makeNebula('#5566ff', 1500, new THREE.Vector3(-1500,  400, -2500)));
scene.add(makeNebula('#ff4488', 1200, new THREE.Vector3( 1800, -500, -2200)));
scene.add(makeNebula('#aa66ff', 1100, new THREE.Vector3( 400, 1300, -3000)));
scene.add(makeNebula('#44ddff', 1000, new THREE.Vector3(-900, -900, -1800)));

// ─── 라벨 ─────────────────────────────────────────────
function makeLabel(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0,0,512,128);
  ctx.font = 'bold 56px system-ui, sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(120, 30, 1);
  return sp;
}

// ─── 태양 ─────────────────────────────────────────────
const sunCenter = new THREE.Vector3(0, 80, -1500);
const sunTex = loadTex(TEX + 'sunmap.jpg');
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(90, 64, 64),
  new THREE.MeshBasicMaterial({ map: sunTex })
);
sun.position.copy(sunCenter);
scene.add(sun);

// 태양 글로우
const glowCanvas = document.createElement('canvas');
glowCanvas.width = glowCanvas.height = 256;
const gctx = glowCanvas.getContext('2d');
const gg = gctx.createRadialGradient(128,128,0, 128,128,128);
gg.addColorStop(0, 'rgba(255,220,120,1)');
gg.addColorStop(0.3, 'rgba(255,180,60,0.5)');
gg.addColorStop(1, 'rgba(255,140,40,0)');
gctx.fillStyle = gg; gctx.fillRect(0,0,256,256);
const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
  map: new THREE.CanvasTexture(glowCanvas),
  blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.9
}));
sunGlow.scale.set(400, 400, 1);
sunGlow.position.copy(sunCenter);
scene.add(sunGlow);

const sunLabel = makeLabel('태양 (Sun)', '#ffd97a');
sunLabel.position.set(sunCenter.x, sunCenter.y + 130, sunCenter.z);
scene.add(sunLabel);

const sunLight = new THREE.PointLight(0xffeecc, 5, 0, 0);
sunLight.position.copy(sunCenter);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x223355, 0.35));

// ─── 행성 데이터 ──────────────────────────────────────
// 실제 비율은 너무 극단적이라(목성 ≈ 수성×28) 시각화용으로 압축
const PLANETS = [
  { key: 'mercury', name: '수성 (Mercury)',  radius: 6,
    map: 'mercurymap.jpg', bump: 'mercurybump.jpg',
    orbit: 180,  speed: 0.20, axisTilt: 0.0,  spin: 0.5,  labelColor: '#cccccc' },
  { key: 'venus',   name: '금성 (Venus)',    radius: 11,
    map: 'venusmap.jpg',  bump: 'venusbump.jpg',
    orbit: 260,  speed: 0.14, axisTilt: 3.1,  spin: -0.2, labelColor: '#ffd58c' },
  { key: 'earth',   name: '지구 (Earth)',    radius: 12,
    map: 'earthmap1k.jpg', bump: 'earthbump1k.jpg', spec: 'earthspec1k.jpg',
    clouds: 'earthcloudmap.jpg',
    orbit: 350,  speed: 0.11, axisTilt: 0.41, spin: 0.6,  labelColor: '#7fb8ff' },
  { key: 'mars',    name: '화성 (Mars)',     radius: 8,
    map: 'marsmap1k.jpg', bump: 'marsbump1k.jpg',
    orbit: 450,  speed: 0.09, axisTilt: 0.44, spin: 0.55, labelColor: '#ff8a5b' },
  { key: 'jupiter', name: '목성 (Jupiter)',  radius: 38,
    map: 'jupitermap.jpg',
    orbit: 620,  speed: 0.05, axisTilt: 0.05, spin: 1.2,  labelColor: '#f0c891' },
  { key: 'saturn',  name: '토성 (Saturn)',   radius: 32,
    map: 'saturnmap.jpg', ringMap: 'saturnringcolor.jpg',
    orbit: 800,  speed: 0.04, axisTilt: 0.47, spin: 1.0,  labelColor: '#ffe9b8', ring: true },
  { key: 'uranus',  name: '천왕성 (Uranus)', radius: 20,
    map: 'uranusmap.jpg',
    orbit: 970,  speed: 0.025, axisTilt: 1.71, spin: 0.7, labelColor: '#b8efff' },
  { key: 'neptune', name: '해왕성 (Neptune)', radius: 19,
    map: 'neptunemap.jpg',
    orbit: 1130, speed: 0.02, axisTilt: 0.49, spin: 0.7,  labelColor: '#7c93ff' },
];

const planetMeshes = {};
for (const p of PLANETS) {
  const matOpts = {
    map: loadTex(TEX + p.map),
    roughness: 0.95,
    metalness: 0.0,
  };
  if (p.bump) {
    matOpts.bumpMap = loadData(TEX + p.bump);
    matOpts.bumpScale = 0.35;
  }
  if (p.spec) {
    // 바다 = 밝게 반사 (지구). roughnessMap의 반전된 형태를 specular로 활용
    matOpts.roughnessMap = loadData(TEX + p.spec);
    matOpts.roughness = 0.75;
    matOpts.metalness = 0.1;
  }

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.radius, 64, 64),
    new THREE.MeshStandardMaterial(matOpts)
  );
  mesh.rotation.z = p.axisTilt; // 자전축 기울기
  mesh.userData = { ...p, angle: Math.random() * Math.PI * 2 };
  scene.add(mesh);

  // 이름 라벨
  const label = makeLabel(p.name, p.labelColor);
  scene.add(label);
  mesh.userData.label = label;

  // 지구 구름 레이어
  if (p.clouds) {
    const cloudsTex = loadTex(TEX + p.clouds);
    const cloudsMat = new THREE.MeshStandardMaterial({
      map: cloudsTex,
      transparent: true,
      opacity: 0.5,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(p.radius * 1.015, 64, 64),
      cloudsMat
    );
    mesh.add(clouds);
    mesh.userData.cloudsMesh = clouds;
  }

  // 토성 고리 (실제 컬러 텍스처)
  if (p.ring) {
    const innerR = p.radius * 1.35;
    const outerR = p.radius * 2.4;
    const ringGeo = new THREE.RingGeometry(innerR, outerR, 128, 8);

    // RingGeometry의 기본 UV는 텍스처가 방사형이 아니라 원주 방향으로 감김
    // 텍스처가 안→밖으로 변하도록 UV를 재설정
    const posAttr = ringGeo.attributes.position;
    const uvAttr  = ringGeo.attributes.uv;
    for (let i = 0; i < posAttr.count; i++) {
      const x = posAttr.getX(i), y = posAttr.getY(i);
      const r = Math.sqrt(x*x + y*y);
      const u = (r - innerR) / (outerR - innerR);
      uvAttr.setXY(i, u, 0.5);
    }
    uvAttr.needsUpdate = true;

    const ringTex = loadTex(TEX + p.ringMap);
    const ringMat = new THREE.MeshBasicMaterial({
      map: ringTex,
      alphaMap: ringTex,   // 밝은 부분 = 불투명, 어두운 부분 = 투명
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI * 0.5 - 0.15;
    mesh.add(ring);
    mesh.userData.ring = ring;
  }

  planetMeshes[p.key] = mesh;
}

// ─── 궤도 가이드 라인 ────────────────────────────────
for (const p of PLANETS) {
  const segments = 128;
  const pts = new Float32Array((segments + 1) * 3);
  for (let i = 0; i <= segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    pts[i*3]   = sunCenter.x + Math.cos(a) * p.orbit;
    pts[i*3+1] = sunCenter.y;
    pts[i*3+2] = sunCenter.z + Math.sin(a) * p.orbit;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pts, 3));
  const m = new THREE.LineBasicMaterial({ color: 0x445577, transparent: true, opacity: 0.22 });
  const line = new THREE.LineLoop(g, m);
  scene.add(line);
  planetMeshes[p.key].userData.orbitLine = line;
}

// ─── XR 컨트롤러 + 스틱 이동 ─────────────────────────
const controllerFactory = new XRControllerModelFactory();
for (let i = 0; i < 2; i++) {
  const c = renderer.xr.getController(i);
  player.add(c);
  const grip = renderer.xr.getControllerGrip(i);
  grip.add(controllerFactory.createControllerModel(grip));
  player.add(grip);
}
const moveSpeed = 60;
const tmpQuat = new THREE.Quaternion();
const tmpVec = new THREE.Vector3();
function handleXRInput(dt) {
  const session = renderer.xr.getSession();
  if (!session) return;
  for (const src of session.inputSources) {
    if (!src.gamepad) continue;
    const axes = src.gamepad.axes;
    if (axes.length < 4) continue;
    const x = Math.abs(axes[2]) > 0.15 ? axes[2] : 0;
    const z = Math.abs(axes[3]) > 0.15 ? axes[3] : 0;
    if (x === 0 && z === 0) continue;
    followKey = null; followLocalOffset = null; // 사용자가 스틱을 잡으면 자동 추적 해제
    camera.getWorldQuaternion(tmpQuat);
    tmpVec.set(x, 0, z).applyQuaternion(tmpQuat);
    tmpVec.y = 0;
    tmpVec.normalize().multiplyScalar(moveSpeed * dt);
    player.position.add(tmpVec);
  }
}

// ─── 카메라 자동 비행 / 추적 ─────────────────────────
const _camWorld = new THREE.Vector3();
const _targetPos = new THREE.Vector3();
const _lookAt = new THREE.Vector3();
const _fromSun = new THREE.Vector3();
const _invQuat = new THREE.Quaternion();

// 음성 명령으로 행성을 골랐을 때: 접근 위치를 계산하고
// 그 위치를 행성의 '로컬 좌표'로 변환해 저장 → 자전 시 같이 회전
function setFollow(key) {
  followKey = key;
  followLocalOffset = null;
  if (key === 'home' || key === 'sun') return;
  const mesh = planetMeshes[key];
  if (!mesh) return;

  // 태양→행성 방향(궤도 바깥쪽)에서 접근. 반지름의 ~4배.
  _fromSun.copy(mesh.position).sub(sunCenter).normalize();
  const dist = mesh.userData.radius * 4 + 6;
  const worldOffset = _fromSun.multiplyScalar(dist);
  worldOffset.y += mesh.userData.radius * 0.8;

  // 월드 오프셋을 행성 로컬 프레임으로 변환 (자전축 기울기·현재 자전 각도 모두 반영)
  followLocalOffset = worldOffset.clone();
  _invQuat.copy(mesh.quaternion).invert();
  followLocalOffset.applyQuaternion(_invQuat);
}

function computeFollowPose(key, outTarget, outLook) {
  if (key === 'home') {
    outTarget.copy(HOME_CAM);
    outLook.copy(HOME_TARGET);
    return true;
  }
  if (key === 'sun') {
    _fromSun.set(0, 0, 1);
    outTarget.copy(sunCenter).add(_fromSun.multiplyScalar(260));
    outTarget.y += 40;
    outLook.copy(sunCenter);
    return true;
  }
  const mesh = planetMeshes[key];
  if (!mesh || !followLocalOffset) return false;

  // 로컬 오프셋을 행성의 현재 quaternion(=자전 + 축 기울기)으로 회전 → 월드 오프셋
  outTarget.copy(followLocalOffset)
           .applyQuaternion(mesh.quaternion)
           .add(mesh.position);
  outLook.copy(mesh.position);
  return true;
}

function updateFollow(dt) {
  if (!followKey) return;
  if (!computeFollowPose(followKey, _targetPos, _lookAt)) return;

  // 부드럽게 따라가는 댐핑 (1초에 ~85% 좁힘)
  const k = 1 - Math.pow(0.15, dt);

  if (renderer.xr.isPresenting) {
    // XR: player 리그를 움직여 사용자가 그 위치로 이동
    camera.getWorldPosition(_camWorld);
    const dx = (_targetPos.x - _camWorld.x) * k;
    const dy = (_targetPos.y - _camWorld.y) * k;
    const dz = (_targetPos.z - _camWorld.z) * k;
    player.position.x += dx;
    player.position.y += dy;
    player.position.z += dz;
  } else {
    camera.position.lerp(_targetPos, k);
    controls.target.lerp(_lookAt, k);
  }
}

// ─── 가시성 제어 ─────────────────────────────────────
function getTargetObjs(key) {
  if (key === 'sun') return [sun, sunGlow, sunLabel];
  const m = planetMeshes[key];
  if (!m) return [];
  const objs = [m, m.userData.label];
  if (m.userData.orbitLine) objs.push(m.userData.orbitLine);
  return objs;
}
const ALL_KEYS = ['sun', ...PLANETS.map(p => p.key)];
function setVisibility(showSet) {
  for (const key of ALL_KEYS) {
    const visible = showSet === 'all' ? true : (showSet === 'none' ? false : showSet.has(key));
    getTargetObjs(key).forEach(o => { if (o) o.visible = visible; });
  }
}

// ─── 음성 인식 ───────────────────────────────────────
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, listening = false;
function setStatus(msg) { statusEl.textContent = msg; }

const PLANET_KEYWORDS = {
  mercury: /(수성|머큐리|mercury)/,
  venus:   /(금성|비너스|venus)/,
  earth:   /(지구|어스|earth)/,
  mars:    /(화성|마스|mars)/,
  jupiter: /(목성|주피터|jupiter)/,
  saturn:  /(토성|새턴|saturn)/,
  uranus:  /(천왕성|우라너스|uranus)/,
  neptune: /(해왕성|넵튠|neptune)/,
  sun:     /(태양|항성|해|sun)/,
};

function parseCommand(text) {
  const t = text.toLowerCase().replace(/\s+/g, '');
  if (/(처음|시작위치|홈으로|리셋|reset|home)/.test(t))  return { kind: 'home' };
  if (/(전부|모두|다보여|전체|all|everything)/.test(t))   return { kind: 'all' };
  if (/(다숨겨|모두숨|전부숨|hideall|nothing)/.test(t))    return { kind: 'none' };
  const wanted = new Set();
  for (const [key, re] of Object.entries(PLANET_KEYWORDS)) {
    if (re.test(t)) wanted.add(key);
  }
  if (wanted.size > 0) return { kind: 'set', wanted };
  return { kind: 'unknown' };
}
function executeCommand(text) {
  const cmd = parseCommand(text);
  if (cmd.kind === 'home') {
    followKey = 'home';
    followLocalOffset = null;
    setVisibility('all');
    setStatus(`🏠 시작 위치로 복귀: "${text}"`);
  }
  else if (cmd.kind === 'all') {
    setVisibility('all');
    setStatus(`✓ 전부 표시: "${text}"`);
  }
  else if (cmd.kind === 'none') {
    setVisibility('none');
    setStatus(`✓ 모두 숨김: "${text}"`);
  }
  else if (cmd.kind === 'set') {
    setVisibility('all'); // 다른 행성도 보이게 (맥락 유지)
    const first = [...cmd.wanted][0];
    setFollow(first);
    setStatus(`✈ ${first} 로 이동 (자전 동행): "${text}"`);
  }
  else {
    setStatus(`? 인식 못함: "${text}"`);
  }
}
if (!SR) {
  micBtn.disabled = true;
  micBtn.textContent = '음성 미지원 브라우저';
  setStatus('Chrome/Edge에서 사용하세요');
} else {
  recog = new SR();
  recog.lang = 'ko-KR';
  recog.continuous = true;
  recog.interimResults = false;
  recog.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) executeCommand(e.results[i][0].transcript.trim());
    }
  };
  recog.onerror = (e) => setStatus('오류: ' + e.error);
  recog.onend = () => {
    if (listening) { try { recog.start(); } catch(_){} }
    else { micBtn.classList.remove('listening'); micBtn.textContent = '🎙 음성 시작'; }
  };
  micBtn.addEventListener('click', () => {
    if (!listening) {
      try { recog.start(); listening = true; micBtn.classList.add('listening'); micBtn.textContent = '⏹ 음성 중지'; setStatus('듣는 중… 행성 이름을 말하세요'); }
      catch(err) { setStatus('시작 실패: ' + err.message); }
    } else { listening = false; recog.stop(); }
  });
}

// ─── 리사이즈 ────────────────────────────────────────
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── 메인 루프 ───────────────────────────────────────
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  const t  = clock.elapsedTime;

  sun.rotation.y += dt * 0.05;
  sunGlow.material.opacity = 0.85 + Math.sin(t * 0.8) * 0.08;

  for (const p of PLANETS) {
    const mesh = planetMeshes[p.key];
    mesh.userData.angle += dt * p.speed;
    const a = mesh.userData.angle;
    mesh.position.set(
      sunCenter.x + Math.cos(a) * p.orbit,
      sunCenter.y + Math.sin(a * 0.3) * 6,
      sunCenter.z + Math.sin(a) * p.orbit
    );
    mesh.rotation.y += dt * p.spin;
    // 구름은 본체보다 살짝 빠르게
    if (mesh.userData.cloudsMesh) mesh.userData.cloudsMesh.rotation.y += dt * 0.08;

    const label = mesh.userData.label;
    label.position.set(mesh.position.x, mesh.position.y + p.radius + 22, mesh.position.z);
  }

  handleXRInput(dt);
  updateFollow(dt);
  controls.update();
  renderer.render(scene, camera);
});
</script>
