<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Universe XR - 태양계 탐험</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: system-ui, sans-serif; }
  #info {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(0,0,0,0.5); padding: 10px 14px; border-radius: 8px;
    font-size: 13px; line-height: 1.5; max-width: 360px;
  }
  #info b { color: #8ec5ff; }
  #voice {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  }
  #micBtn {
    background: #1a73e8; color: #fff; border: 0; padding: 10px 16px;
    border-radius: 999px; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  #micBtn.listening { background: #d93025; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(217,48,37,.7);} 50% { box-shadow: 0 0 0 12px rgba(217,48,37,0);} }
  #status {
    background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 6px;
    font-size: 12px; max-width: 320px; text-align: right; min-height: 18px;
  }
</style>
</head>
<body>
<div id="info">
  <b>Universe XR — 태양계 탐험</b><br/>
  • PC: 마우스 드래그 회전, 휠 줌<br/>
  • XR 고글: 우하단 <b>VR/AR 입장</b>, 스틱으로 이동<br/>
  • 음성 명령 예시:<br/>
  &nbsp;&nbsp;"지구만 보여줘", "목성", "토성"<br/>
  &nbsp;&nbsp;"태양만", "전부 보여줘", "다 숨겨"
</div>

<div id="voice">
  <button id="micBtn">🎙 음성 시작</button>
  <div id="status">음성 인식 대기</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000005);
scene.fog = new THREE.FogExp2(0x000010, 0.00005);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 30000);
camera.position.set(0, 1.6, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.6, -10);

// XR을 위한 플레이어 리그
const player = new THREE.Group();
player.add(camera);
scene.add(player);

// ─── 별: 다층 별필드 ──────────────────────────────────
function makeStars(count, radius, size, color) {
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    const r = radius * (0.6 + 0.4 * Math.random());
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color, size, sizeAttenuation: true,
    transparent: true, opacity: 0.95, depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  return new THREE.Points(geo, mat);
}
scene.add(makeStars(8000, 5000, 2.5, 0xffffff));
scene.add(makeStars(3000, 4500, 4.0, 0xaaccff));
scene.add(makeStars(1500, 4000, 5.5, 0xffd9a8));
scene.add(makeStars(800,  3500, 7.0, 0xff9b6b));

// ─── 성운(반투명 빌보드) ─────────────────────────────
function makeNebula(color, size, position) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(128,128,0, 128,128,128);
  grad.addColorStop(0, color + 'ff');
  grad.addColorStop(0.4, color + '55');
  grad.addColorStop(1, color + '00');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,256,256);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.65 });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(size, size, 1);
  sp.position.copy(position);
  return sp;
}
scene.add(makeNebula('#5566ff', 1500, new THREE.Vector3(-1500,  400, -2500)));
scene.add(makeNebula('#ff4488', 1200, new THREE.Vector3( 1800, -500, -2200)));
scene.add(makeNebula('#aa66ff', 1100, new THREE.Vector3( 400, 1300, -3000)));
scene.add(makeNebula('#44ddff', 1000, new THREE.Vector3(-900, -900, -1800)));

// ─── 라벨 ─────────────────────────────────────────────
function makeLabel(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0,0,512,128);
  ctx.font = 'bold 56px system-ui, sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(120, 30, 1);
  return sp;
}

// ─── 태양 ─────────────────────────────────────────────
const sunCenter = new THREE.Vector3(0, 80, -1500);
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(90, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0xffd97a })
);
sun.position.copy(sunCenter);
scene.add(sun);

// 태양 글로우 (sprite)
const glowCanvas = document.createElement('canvas');
glowCanvas.width = glowCanvas.height = 256;
const gctx = glowCanvas.getContext('2d');
const gg = gctx.createRadialGradient(128,128,0, 128,128,128);
gg.addColorStop(0, 'rgba(255,220,120,1)');
gg.addColorStop(0.3, 'rgba(255,180,60,0.5)');
gg.addColorStop(1, 'rgba(255,140,40,0)');
gctx.fillStyle = gg; gctx.fillRect(0,0,256,256);
const glowMat = new THREE.SpriteMaterial({
  map: new THREE.CanvasTexture(glowCanvas),
  blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.9
});
const sunGlow = new THREE.Sprite(glowMat);
sunGlow.scale.set(400, 400, 1);
sunGlow.position.copy(sunCenter);
scene.add(sunGlow);

const sunLabel = makeLabel('태양 (Sun)', '#ffd97a');
sunLabel.position.set(sunCenter.x, sunCenter.y + 130, sunCenter.z);
scene.add(sunLabel);

const sunLight = new THREE.PointLight(0xffeecc, 5, 0, 0);
sunLight.position.copy(sunCenter);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x223355, 0.35));

// ─── 8개 행성 데이터 ─────────────────────────────────
// 실제 비율은 너무 극단적이라(목성 ~110x 수성) 시각화를 위해 압축한 값
const PLANETS = [
  { key: 'mercury', name: '수성 (Mercury)',  radius: 6,  color: 0x9a9a9a, emissive: 0x1a1a1a, orbit: 180,  speed: 0.20, tilt: 0.02, labelColor: '#cccccc' },
  { key: 'venus',   name: '금성 (Venus)',    radius: 11, color: 0xe5b66a, emissive: 0x3a2410, tilt: -0.04, orbit: 260,  speed: 0.14, labelColor: '#ffd58c' },
  { key: 'earth',   name: '지구 (Earth)',    radius: 12, color: 0x3a7bd5, emissive: 0x0a1a30, orbit: 350,  speed: 0.11, tilt: 0.05, labelColor: '#7fb8ff' },
  { key: 'mars',    name: '화성 (Mars)',     radius: 8,  color: 0xc1440e, emissive: 0x401005, orbit: 450,  speed: 0.09, tilt: 0.04, labelColor: '#ff8a5b' },
  { key: 'jupiter', name: '목성 (Jupiter)',  radius: 38, color: 0xd2a679, emissive: 0x3a2614, orbit: 620,  speed: 0.05, tilt: 0.01, labelColor: '#f0c891' },
  { key: 'saturn',  name: '토성 (Saturn)',   radius: 32, color: 0xe8d3a2, emissive: 0x3a2c14, orbit: 800,  speed: 0.04, tilt: 0.06, labelColor: '#ffe9b8', ring: true },
  { key: 'uranus',  name: '천왕성 (Uranus)', radius: 20, color: 0x9ad6e0, emissive: 0x0e2a30, orbit: 970,  speed: 0.025, tilt: 0.08, labelColor: '#b8efff' },
  { key: 'neptune', name: '해왕성 (Neptune)', radius: 19, color: 0x3a55c5, emissive: 0x0a1230, orbit: 1130, speed: 0.02, tilt: 0.03, labelColor: '#7c93ff' },
];

const planetMeshes = {};
for (const p of PLANETS) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.radius, 48, 48),
    new THREE.MeshStandardMaterial({
      color: p.color, emissive: p.emissive, emissiveIntensity: 0.12,
      roughness: 0.85, metalness: 0.0
    })
  );
  mesh.userData = { ...p, angle: Math.random() * Math.PI * 2 };
  scene.add(mesh);

  const label = makeLabel(p.name, p.labelColor);
  scene.add(label);
  mesh.userData.label = label;

  // 토성 고리
  if (p.ring) {
    const ringGeo = new THREE.RingGeometry(p.radius * 1.4, p.radius * 2.3, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xffeebb, side: THREE.DoubleSide, transparent: true, opacity: 0.55
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI * 0.42;
    mesh.add(ring);          // 행성 자식으로 추가 → 같이 이동
    mesh.userData.ring = ring;
  }

  planetMeshes[p.key] = mesh;
}

// ─── 궤도 라인(가이드) ───────────────────────────────
for (const p of PLANETS) {
  const segments = 128;
  const pts = new Float32Array((segments + 1) * 3);
  for (let i = 0; i <= segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    pts[i*3]   = sunCenter.x + Math.cos(a) * p.orbit;
    pts[i*3+1] = sunCenter.y;
    pts[i*3+2] = sunCenter.z + Math.sin(a) * p.orbit;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pts, 3));
  const m = new THREE.LineBasicMaterial({ color: 0x445577, transparent: true, opacity: 0.25 });
  const line = new THREE.LineLoop(g, m);
  scene.add(line);
  planetMeshes[p.key].userData.orbitLine = line;
}

// ─── XR 컨트롤러 ──────────────────────────────────────
const controllerFactory = new XRControllerModelFactory();
for (let i = 0; i < 2; i++) {
  const c = renderer.xr.getController(i);
  player.add(c);
  const grip = renderer.xr.getControllerGrip(i);
  grip.add(controllerFactory.createControllerModel(grip));
  player.add(grip);
}

// 스틱으로 이동
const moveSpeed = 60;
const tmpQuat = new THREE.Quaternion();
const tmpVec = new THREE.Vector3();
function handleXRInput(dt) {
  const session = renderer.xr.getSession();
  if (!session) return;
  for (const src of session.inputSources) {
    if (!src.gamepad) continue;
    const axes = src.gamepad.axes;
    if (axes.length < 4) continue;
    const x = Math.abs(axes[2]) > 0.15 ? axes[2] : 0;
    const z = Math.abs(axes[3]) > 0.15 ? axes[3] : 0;
    if (x === 0 && z === 0) continue;
    camera.getWorldQuaternion(tmpQuat);
    tmpVec.set(x, 0, z).applyQuaternion(tmpQuat);
    tmpVec.y = 0;
    tmpVec.normalize().multiplyScalar(moveSpeed * dt);
    player.position.add(tmpVec);
  }
}

// ─── 가시성 제어 ─────────────────────────────────────
function getTargetObjs(key) {
  if (key === 'sun') return [sun, sunGlow, sunLabel];
  const m = planetMeshes[key];
  if (!m) return [];
  const objs = [m, m.userData.label];
  if (m.userData.orbitLine) objs.push(m.userData.orbitLine);
  return objs;
}
const ALL_KEYS = ['sun', ...PLANETS.map(p => p.key)];

function setVisibility(showSet) {
  for (const key of ALL_KEYS) {
    const visible = showSet === 'all' ? true : (showSet === 'none' ? false : showSet.has(key));
    getTargetObjs(key).forEach(o => { if (o) o.visible = visible; });
  }
}

// ─── 음성 인식 ───────────────────────────────────────
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, listening = false;
function setStatus(msg) { statusEl.textContent = msg; }

const PLANET_KEYWORDS = {
  mercury: /(수성|머큐리|mercury)/,
  venus:   /(금성|비너스|venus)/,
  earth:   /(지구|어스|earth)/,
  mars:    /(화성|마스|mars)/,
  jupiter: /(목성|주피터|jupiter)/,
  saturn:  /(토성|새턴|saturn)/,
  uranus:  /(천왕성|우라너스|uranus)/,
  neptune: /(해왕성|넵튠|neptune)/,
  sun:     /(태양|항성|해|sun)/,
};

function parseCommand(text) {
  const t = text.toLowerCase().replace(/\s+/g, '');
  if (/(전부|모두|다보여|전체|all|everything)/.test(t)) return { kind: 'all' };
  if (/(다숨겨|모두숨|전부숨|hideall|nothing)/.test(t)) return { kind: 'none' };
  const wanted = new Set();
  for (const [key, re] of Object.entries(PLANET_KEYWORDS)) {
    if (re.test(t)) wanted.add(key);
  }
  if (wanted.size > 0) return { kind: 'set', wanted };
  return { kind: 'unknown' };
}

function executeCommand(text) {
  const cmd = parseCommand(text);
  if (cmd.kind === 'all')       { setVisibility('all');  setStatus(`✓ 전부 표시: "${text}"`); }
  else if (cmd.kind === 'none') { setVisibility('none'); setStatus(`✓ 모두 숨김: "${text}"`); }
  else if (cmd.kind === 'set')  { setVisibility(cmd.wanted); setStatus(`✓ 표시: ${[...cmd.wanted].join(', ')} ("${text}")`); }
  else                          { setStatus(`? 인식 못함: "${text}"`); }
}

if (!SR) {
  micBtn.disabled = true;
  micBtn.textContent = '음성 미지원 브라우저';
  setStatus('Chrome/Edge에서 사용하세요');
} else {
  recog = new SR();
  recog.lang = 'ko-KR';
  recog.continuous = true;
  recog.interimResults = false;
  recog.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) executeCommand(e.results[i][0].transcript.trim());
    }
  };
  recog.onerror = (e) => setStatus('오류: ' + e.error);
  recog.onend = () => {
    if (listening) { try { recog.start(); } catch(_){} }
    else { micBtn.classList.remove('listening'); micBtn.textContent = '🎙 음성 시작'; }
  };
  micBtn.addEventListener('click', () => {
    if (!listening) {
      try { recog.start(); listening = true; micBtn.classList.add('listening'); micBtn.textContent = '⏹ 음성 중지'; setStatus('듣는 중… 행성 이름을 말하세요'); }
      catch(err) { setStatus('시작 실패: ' + err.message); }
    } else { listening = false; recog.stop(); }
  });
}

// ─── 리사이즈 ────────────────────────────────────────
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── 메인 루프 ───────────────────────────────────────
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  const t  = clock.elapsedTime;

  // 태양 자전 + 글로우 약간 펄스
  sun.rotation.y += dt * 0.05;
  sunGlow.material.opacity = 0.85 + Math.sin(t * 0.8) * 0.08;

  // 행성 궤도 + 자전 + 라벨 추적
  for (const p of PLANETS) {
    const mesh = planetMeshes[p.key];
    mesh.userData.angle += dt * p.speed;
    const a = mesh.userData.angle;
    mesh.position.set(
      sunCenter.x + Math.cos(a) * p.orbit,
      sunCenter.y + Math.sin(a * 0.3) * 8, // 살짝 위아래 흔들림
      sunCenter.z + Math.sin(a) * p.orbit
    );
    mesh.rotation.y += dt * (0.4 + p.tilt);
    const label = mesh.userData.label;
    label.position.set(mesh.position.x, mesh.position.y + p.radius + 20, mesh.position.z);
  }

  handleXRInput(dt);
  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
